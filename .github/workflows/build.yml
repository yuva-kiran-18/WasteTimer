name: Android CI Build

on:
  push:
    branches: [ "main" ]

# THIS IS THE MAGIC KEY: It allows the action to create a Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Build a Debug APK so Android accepts the signature automatically
    - name: Build Debug APK for Obtainium
      run: ./gradlew assembleDebug

    - name: Publish Release for Obtainium
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "WasteTimer Update #${{ github.run_number }}"
        files: app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
